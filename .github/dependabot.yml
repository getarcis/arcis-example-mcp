version: 2
# Monthly grouped dep updates, matches the cadence of the other Arcis
# example repos.
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: monthly
    open-pull-requests-limit: 5
    groups:
      all-deps:
        patterns: ["*"]
    labels:
      - dependencies
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
    labels:
      - dependencies
      - ci
